<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Заправка">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Заправка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== Тема: змінні ===== */
:root[data-theme="dark"]{
  --bg:#0a0a0a;
  --surface:#232323;
  --surface-2:#141414;
  --line:#383838;
  --text:#f0ebe3;
  --text-dim:#8a8378;
  --grass:#4fa238;
  --grass-bright:#71c457;
  --grass-ink:#0a0a0a;
  --danger:#c97a6a;
  --shadow:0 1px 0 rgba(255,255,255,.10) inset, 0 2px 5px rgba(0,0,0,.5), 0 12px 26px rgba(0,0,0,.6);
  --shadow-sm:0 1px 0 rgba(255,255,255,.09) inset, 0 2px 6px rgba(0,0,0,.5);
  --inset:inset 0 2px 6px rgba(0,0,0,.75), inset 0 -1px 0 rgba(255,255,255,.05);
}
:root[data-theme="light"]{
  --bg:#f3efe8;
  --surface:#ffffff;
  --surface-2:#f0e9dd;
  --line:#ddd3c4;
  --text:#1f1b14;
  --text-dim:#7a7060;
  --grass:#4fa238;
  --grass-bright:#3f7d28;
  --grass-ink:#0a0a0a;
  --danger:#b4503c;
  --shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 2px 5px rgba(90,70,30,.10), 0 10px 22px rgba(90,70,30,.13);
  --shadow-sm:0 1px 0 rgba(255,255,255,.7) inset, 0 2px 6px rgba(90,70,30,.10);
  --inset:inset 0 2px 5px rgba(90,70,30,.16), inset 0 -1px 0 rgba(255,255,255,.6);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:17px;
  line-height:1.4;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
#app{max-width:560px;margin:0 auto;padding:18px 16px 26px;}
.num{font-family:'Fraunces',serif;font-variant-numeric:tabular-nums;}

/* ===== Заголовки екранів ===== */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;min-height:48px;}
.topbar h1{
  font-family:'Fraunces',serif;font-weight:500;
  font-size:32px;margin:0;letter-spacing:-.5px;flex:1;
}
.icon-btn{
  background:var(--surface);border:1px solid var(--line);color:var(--text);
  width:48px;height:48px;border-radius:14px;font-size:20px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .1s,background .2s;flex:none;
}
.icon-btn:active{transform:scale(.93);}
.back{font-size:24px;}

/* ===== Картки авто ===== */
.car-card{
  background:var(--surface);border:1px solid var(--line);border-radius:20px;
  padding:20px;margin-bottom:14px;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .1s,border-color .2s;display:flex;align-items:center;gap:16px;
}
.car-card:active{transform:scale(.985);}
.car-card .name{font-family:'Fraunces',serif;font-size:24px;font-weight:500;}
.car-card .sub{color:var(--text-dim);font-size:14px;margin-top:4px;}
.car-card .big{margin-left:auto;text-align:right;}
.car-card .big .v{font-family:'Fraunces',serif;font-size:30px;color:var(--grass-bright);}
.car-card .big .u{color:var(--text-dim);font-size:12px;}
.car-manage{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}

/* ===== Дашборд ===== */
.hero{
  background:var(--surface);border:1px solid var(--line);border-radius:22px;
  padding:26px 22px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);
}
.hero .label{color:var(--text-dim);font-size:14px;text-transform:lowercase;letter-spacing:.5px;}
.hero .hero-name{font-family:'Fraunces',serif;font-size:19px;font-weight:500;text-align:left;color:var(--text);margin-bottom:4px;}
.hero .value{font-family:'Fraunces',serif;font-size:64px;font-weight:500;line-height:1;color:var(--grass-bright);margin:10px 0 4px;}
.hero .unit{color:var(--text-dim);font-size:15px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat{
  background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 18px;
  box-shadow:var(--shadow-sm);
}
.stat .label{color:var(--text-dim);font-size:13px;}
.stat .value{font-family:'Fraunces',serif;font-size:30px;font-weight:500;margin-top:6px;line-height:1;}
.stat .unit{color:var(--text-dim);font-size:12px;margin-left:4px;}

.section-title{
  font-family:'JetBrains Mono';color:var(--text-dim);font-size:13px;
  text-transform:uppercase;letter-spacing:1.5px;margin:24px 4px 12px;
}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm);}
.panel .row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 18px;border-bottom:1px solid var(--line);}
.panel .row:last-child{border-bottom:none;}
.panel .row .k{color:var(--text-dim);font-size:14px;}
.panel .row .v{font-family:'Fraunces',serif;font-size:22px;}
.panel .row .v small{color:var(--text-dim);font-size:12px;font-family:'JetBrains Mono';margin-left:3px;}

/* ===== Кнопки ===== */
.btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;min-height:62px;border-radius:16px;border:none;cursor:pointer;
  font-family:'JetBrains Mono';font-size:18px;font-weight:600;
  transition:transform .1s,opacity .2s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--grass);color:var(--grass-ink);box-shadow:var(--shadow);transition:transform .1s,opacity .2s,background-color .35s ease,color .35s ease,box-shadow .1s;}
.btn-primary:active{box-shadow:var(--shadow-sm);}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--line);box-shadow:var(--shadow-sm);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-row{display:flex;gap:12px;margin-bottom:12px;}
.btn-row .btn{flex:1;}
.fab-wrap{margin:18px 0 6px;}

/* ===== Форма / поля введення ===== */
.field{margin-bottom:18px;}
.field label{display:block;color:var(--text-dim);font-size:14px;margin:0 4px 8px;}
.field input{
  width:100%;background:var(--surface-2);border:2px solid var(--line);border-radius:16px;
  color:var(--text);font-family:'Fraunces',serif;font-size:30px;font-weight:500;
  padding:16px 20px;outline:none;transition:border-color .2s;box-shadow:var(--inset);
}
.field input:focus{border-color:var(--grass);}
.field .hint{color:var(--text-dim);font-size:12px;margin:6px 4px 0;}

/* перемикач «повний бак» */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:16px 18px;margin-bottom:18px;cursor:pointer;box-shadow:var(--shadow-sm);
}
.toggle-row .t-label{font-size:16px;}
.toggle-row .t-sub{color:var(--text-dim);font-size:12px;margin-top:3px;}
.switch{width:58px;height:34px;border-radius:20px;background:var(--line);position:relative;flex:none;transition:background .2s;box-shadow:var(--inset);}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.4);}
.toggle-row.on .switch{background:var(--grass);}
.toggle-row.on .switch::after{transform:translateX(24px);}

/* живий прев'ю */
.preview{
  background:var(--surface-2);border:1px dashed var(--grass);border-radius:16px;
  padding:14px 18px;margin-bottom:18px;text-align:center;color:var(--text-dim);font-size:14px;box-shadow:var(--inset);
}
.preview b{font-family:'Fraunces',serif;color:var(--grass-bright);font-size:22px;font-weight:500;}

/* ===== Історія ===== */
.hist-item{
  background:var(--surface-2);border:1px solid var(--line);border-radius:16px;
  padding:15px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:transform .1s;box-shadow:var(--inset);
}
.hist-item:active{transform:scale(.99);}
.hist-item .date{font-family:'Fraunces',serif;font-size:18px;min-width:58px;}
.hist-item .mid{flex:1;}
.hist-item .mid .o{color:var(--text-dim);font-size:13px;}
.hist-item .mid .lc{font-size:15px;margin-top:2px;}
.hist-item .l100{text-align:right;font-family:'Fraunces',serif;font-size:24px;color:var(--grass-bright);}
.hist-item .l100 small{display:block;font-family:'JetBrains Mono';font-size:10px;color:var(--text-dim);}
.tag{display:inline-block;background:var(--surface);color:var(--text-dim);font-size:11px;padding:3px 9px;border-radius:8px;margin-top:4px;}

/* ===== Графіки ===== */
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px 14px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
.chart-card .ct{font-family:'JetBrains Mono';color:var(--text-dim);font-size:13px;margin:0 4px 12px;text-transform:uppercase;letter-spacing:1px;}
svg{display:block;width:100%;height:auto;}

/* ===== Порожній стан ===== */
.empty{text-align:center;color:var(--text-dim);padding:50px 20px;}
.empty .e-ico{font-size:46px;margin-bottom:14px;}
.empty p{margin:0 0 4px;}

/* нижня кнопка-док (у потоці, притиснута донизу через margin-top:auto) */
.dock{padding-top:12px;}

/* ===== Компактний дашборд: усе на один екран ===== */
.dash{
  display:flex;flex-direction:column;
  min-height:calc(100svh - 44px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
}
.dash .topbar{margin-bottom:12px;min-height:40px;}
.dash .topbar h1{font-size:26px;}
.dash .icon-btn{width:42px;height:42px;}
.dash .hero{padding:14px 18px;margin-bottom:10px;border-radius:18px;}
.dash .hero .hero-name{font-size:17px;margin-bottom:2px;}
.dash .hero .label{font-size:13px;}
.dash .hero .value{font-size:46px;margin:2px 0 2px;}
.dash .hero .unit{font-size:13px;}
.dash .topnav{gap:8px;margin-bottom:12px;}
.dash .navbtn{flex:1;min-height:44px;font-size:16px;border-radius:13px;}
.dash .grid{gap:10px;margin-bottom:10px;}
.dash .stat{padding:11px 14px;border-radius:14px;}
.dash .stat .value{font-size:23px;margin-top:3px;}
.dash .section-title{margin:8px 4px 7px;font-size:12px;}
.dash .panel{border-radius:14px;}
.dash .panel .row{padding:8px 16px;}
.dash .panel .row .v{font-size:17px;}
/* док тягнеться на весь залишок, кнопка заправки заповнює його */
.dash .dock{margin-top:12px;flex:1;display:flex;}
.dash .dock .big-add{flex:1;width:100%;min-height:96px;font-size:24px;border-radius:18px;}

/* розділена картка: назва | витрата */
.hero-split{
  display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;
}
.hs-name{
  flex:0 0 40%;display:flex;align-items:center;padding:14px 18px;
  font-family:'Fraunces',serif;font-size:27px;font-weight:500;line-height:1.05;
  word-break:break-word;border-right:1px solid var(--line);border-left:5px solid var(--grass);
  transition:border-left-color .35s ease;
}
.hs-metric{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:12px 8px;}
.hs-metric .label{color:var(--text-dim);font-size:12px;}
.hs-metric .value{font-family:'Fraunces',serif;font-variant-numeric:tabular-nums;font-size:50px;font-weight:500;line-height:1;color:var(--grass-bright);margin:3px 0;transition:color .35s ease;}
.hs-metric .unit{color:var(--text-dim);font-size:12px;}

/* свотчі кольору авто — рівно 7 у ряд (2 ряди по 7) */
.swatches{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin:2px 2px 16px;}
.swatch{aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s;position:relative;box-shadow:0 2px 5px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.25) inset;}
.swatch:active{transform:scale(.9);}
.swatch.sel{border-color:var(--text);}
.swatch.sel::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;text-shadow:0 0 3px rgba(0,0,0,.7),0 1px 2px rgba(0,0,0,.6);}

/* помітна назва авто в налаштуваннях */
.settings-carname{
  font-family:'Fraunces',serif;font-size:30px;font-weight:500;line-height:1;
  padding:10px 16px;margin:0 0 18px;border-left:5px solid var(--grass);
  background:var(--surface);border-radius:0 12px 12px 0;
}

/* фото заправки */
.photo-box{display:flex;flex-direction:column;align-items:flex-start;}
.photo-thumb{
  width:100%;max-height:240px;object-fit:cover;border-radius:14px;
  border:1px solid var(--line);box-shadow:var(--shadow-sm);cursor:pointer;background:var(--surface-2);
}
.photo-overlay{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;padding:16px;cursor:pointer;
}
.photo-overlay img{max-width:100%;max-height:100%;border-radius:8px;}
.photo-close{
  position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.15);color:#fff;font-size:22px;line-height:1;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.photo-close:active{transform:scale(.92);}
.photo-flag{margin-left:6px;opacity:.7;}
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

/* =========================================================
   Заправка — облік витрат пального. Усе локально (localStorage).
   Метод виміру: «від повного до повного». л/100 рахується між
   двома повними заправками; часткові доливи сумуються в проміжку.
   ========================================================= */

const STORE_KEY = "zapravka_v1";

/* ---------- Стан ---------- */
let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.cars){ s._arm=null; s.uiRename=false; s.uiDelCar=false; s.uiAddName=null; s.uiAddAccent=null; s.uiPhotoId=null; s.uiPhotoCleared=false; s._photoBusy=false; s._pendingImport=null; s._pendingPhotos=null; s._importError=null; s._addError=null; if(s.view==="addcar"||s.view==="settings")s.view="cars"; return s; } }
  }catch(e){}
  return { schemaVersion:1, theme:"dark", activeCarId:null, view:"cars", cars:[] };
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}

/* ---------- Сховище фото (IndexedDB) ----------
   Дрібні дані (авто, заправки) лишаються в localStorage. Фото — важкі,
   тому їх тримаємо в IndexedDB, де є гігабайти місця. Один store "photos":
   ключ — id фото, значення — стиснутий JPEG (Blob). */
const PHOTO_DB = "zapravka_photos", PHOTO_STORE = "photos";
let _photoDB = null;
function photoDB(){
  if(_photoDB) return Promise.resolve(_photoDB);
  return new Promise((res,rej)=>{
    try{
      const r = indexedDB.open(PHOTO_DB, 1);
      r.onupgradeneeded = ()=>{ const db=r.result; if(!db.objectStoreNames.contains(PHOTO_STORE)) db.createObjectStore(PHOTO_STORE); };
      r.onsuccess = ()=>{ _photoDB=r.result; res(_photoDB); };
      r.onerror = ()=>rej(r.error);
    }catch(e){ rej(e); }
  });
}
function photoPut(id, blob){
  return photoDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(PHOTO_STORE,"readwrite");
    tx.objectStore(PHOTO_STORE).put(blob, id);
    tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error);
  }));
}
function photoGet(id){
  return photoDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(PHOTO_STORE,"readonly");
    const rq=tx.objectStore(PHOTO_STORE).get(id);
    rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error);
  }));
}
function photoDel(id){
  return photoDB().then(db=>new Promise((res)=>{
    const tx=db.transaction(PHOTO_STORE,"readwrite");
    tx.objectStore(PHOTO_STORE).delete(id);
    tx.oncomplete=()=>res(true); tx.onerror=()=>res(false);
  })).catch(()=>{});
}

/* Запит постійного сховища (щоб система не очищала дані під браком пам'яті).
   На Android працює надійно; на iOS — за наявності, повторюємо при старті. */
function requestPersist(){
  try{ if(navigator.storage && navigator.storage.persist) navigator.storage.persist(); }catch(e){}
}

/* ---------- ZIP (метод STORE, без стиснення) ----------
   Власна мінімальна реалізація: фото вже JPEG, тож компресія не потрібна.
   Архіви сумісні зі звичайними розпакувальниками. */
const _crcTable=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=_crcTable[(c^b[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function strToBytes(s){return new TextEncoder().encode(s);}
function bytesToStr(b){return new TextDecoder().decode(b);}
function zipStore(files){
  const chunks=[],central=[];let offset=0;
  for(const f of files){
    const nameBytes=strToBytes(f.name),data=f.data,crc=crc32(data),size=data.length;
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0,true);lh.setUint16(8,0,true);
    lh.setUint16(10,0,true);lh.setUint16(12,0x21,true);lh.setUint32(14,crc,true);lh.setUint32(18,size,true);
    lh.setUint32(22,size,true);lh.setUint16(26,nameBytes.length,true);lh.setUint16(28,0,true);
    chunks.push(new Uint8Array(lh.buffer),nameBytes,data);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0,true);
    ch.setUint16(10,0,true);ch.setUint16(12,0,true);ch.setUint16(14,0x21,true);ch.setUint32(16,crc,true);
    ch.setUint32(20,size,true);ch.setUint32(24,size,true);ch.setUint16(28,nameBytes.length,true);
    ch.setUint16(30,0,true);ch.setUint16(32,0,true);ch.setUint16(34,0,true);ch.setUint16(36,0,true);
    ch.setUint32(38,0,true);ch.setUint32(42,offset,true);
    central.push(new Uint8Array(ch.buffer),nameBytes);
    offset+=30+nameBytes.length+size;
  }
  let cdSize=0;for(const c of central)cdSize+=c.length;
  const eocd=new DataView(new ArrayBuffer(22));
  eocd.setUint32(0,0x06054b50,true);eocd.setUint16(4,0,true);eocd.setUint16(6,0,true);
  eocd.setUint16(8,files.length,true);eocd.setUint16(10,files.length,true);
  eocd.setUint32(12,cdSize,true);eocd.setUint32(16,offset,true);eocd.setUint16(20,0,true);
  const all=[...chunks,...central,new Uint8Array(eocd.buffer)];
  let total=0;for(const a of all)total+=a.length;
  const out=new Uint8Array(total);let p=0;for(const a of all){out.set(a,p);p+=a.length;}
  return out;
}
function unzipStore(buf){
  const bytes=buf instanceof Uint8Array?buf:new Uint8Array(buf);
  const dv=new DataView(bytes.buffer,bytes.byteOffset,bytes.byteLength);
  const files=[];let p=0;
  while(p+4<=bytes.length){
    if(dv.getUint32(p,true)!==0x04034b50) break;
    const compSize=dv.getUint32(p+18,true),nameLen=dv.getUint16(p+26,true),extraLen=dv.getUint16(p+28,true);
    const name=bytesToStr(bytes.subarray(p+30,p+30+nameLen));
    const dataStart=p+30+nameLen+extraLen;
    files.push({name, data:new Uint8Array(bytes.subarray(dataStart,dataStart+compSize))});
    p=dataStart+compSize;
  }
  return files;
}
function isZip(bytes){ return bytes.length>=2 && bytes[0]===0x50 && bytes[1]===0x4B; }

/* Стиснення фото: вписуємо в макс. сторону, JPEG. Повертає Blob. */
function compressImage(file, maxSide, quality){
  maxSide = maxSide||1280; quality = quality||0.8;
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>h && w>maxSide){ h=Math.round(h*maxSide/w); w=maxSide; }
      else if(h>=w && h>maxSide){ w=Math.round(w*maxSide/h); h=maxSide; }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=> b?res(b):rej(new Error("toBlob")), "image/jpeg", quality);
    };
    img.onerror=()=>rej(new Error("img"));
    img.src=URL.createObjectURL(file);
  });
}

function fmt(n, dec=1){

}
function fmtDate(iso){

/* Колір тексту, який читається на даному тлі: темний на світлих відтінках,
   світлий на темних. Поріг підібраний під великий жирний текст кнопки. */
function inkFor(hex){
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const luma=0.2126*r+0.7152*g+0.0722*b;
  return luma>=0.55 ? "#0a0a0a" : "#ffffff";
}

function feedback(){
  try{ if(navigator.vibrate) navigator.vibrate(12); }catch(e){}
  blip();
}
let _audio=null;
function blip(){
  try{
    _audio = _audio || new (window.AudioContext||window.webkitAudioContext)();
    const o=_audio.createOscillator(), g=_audio.createGain();
    o.connect(g); g.connect(_audio.destination);
    o.frequency.value=520; o.type="sine";
    g.gain.setValueAtTime(.06,_audio.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,_audio.currentTime+.12);
    o.start(); o.stop(_audio.currentTime+.12);
  }catch(e){}
}

/* ---------- Двигун статистики ----------
   carFills: заправки авто, відсортовані за одометром (фізичний порядок).
   computeSpans: проміжки «повний → повний». Літри й гроші проміжку =
   сума всіх заправок ПІСЛЯ попереднього повного й до наступного повного
   включно (отже, часткові доливи теж враховані).                       */
function carFills(car){
  return [...car.fills].sort((a,b)=> a.odometer-b.odometer || a.date.localeCompare(b.date));
}
function computeSpans(car){
  const f = carFills(car);
  const spans = [];
  let lastFull = -1;
  for(let i=0;i<f.length;i++){
    if(lastFull===-1){ if(f[i].full) lastFull=i; continue; }
    if(f[i].full){
      const dist = f[i].odometer - f[lastFull].odometer;
      let liters=0, cost=0;
      for(let j=lastFull+1;j<=i;j++){ liters+=f[j].liters; cost+=f[j].cost; }
      if(dist>0 && liters>0){
        spans.push({
          endDate:f[i].date, endOdo:f[i].odometer,
          dist, liters, cost,
          l100: liters/dist*100,
          kmL: dist/liters,
          eur100: cost/dist*100
        });
      }
      lastFull=i;
    }
  }
  return spans;
}
function computeStats(car){
  const f = carFills(car);
  const spans = computeSpans(car);
  const has = f.length>0;
  const totalSpent = f.reduce((s,x)=>s+x.cost,0);
  const totalDist = has ? f[f.length-1].odometer - f[0].odometer : 0;

  const sDist  = spans.reduce((s,x)=>s+x.dist,0);
  const sLit   = spans.reduce((s,x)=>s+x.liters,0);
  const sCost  = spans.reduce((s,x)=>s+x.cost,0);

  const real = f.filter(x=>!x.isBaseline);
  const lastFill = real.length ? real[real.length-1] : null;
  const lastInterval = f.length>=2 ? f[f.length-1].odometer - f[f.length-2].odometer : null;
  const lastSpan = spans.length ? spans[spans.length-1] : null;
  const totalLiters = real.reduce((s,x)=>s+x.liters,0);

  return {
    fillsCount:real.length,
    spansCount:spans.length,
    avgL100: sDist>0 ? sLit/sDist*100 : null,
    avgKmL:  sLit>0 ? sDist/sLit : null,
    avgEur100: sDist>0 ? sCost/sDist*100 : null,
    avgPriceL: totalLiters>0 ? totalSpent/totalLiters : null,
    totalDist, totalSpent,
    lastFill, lastInterval, lastSpan,
    spans
  };
}

const app = document.getElementById("app");

function render(){
  const root=document.documentElement;
  root.setAttribute("data-theme", state.theme);
  // акцент під колір авто (на екранах, що стосуються конкретного авто)
  const scoped=["car","add","history","charts","carsettings"].includes(state.view);
  let a = scoped ? accentFor(activeCar()) : null;
  // живий прев'ю обраного кольору під час створення авто
  if(!a && state.view==="addcar" && state.uiAddAccent) a = accentFor({accent:state.uiAddAccent});
  if(a){
    root.style.setProperty("--grass",a.base);
    root.style.setProperty("--grass-bright",a.bright);
    root.style.setProperty("--grass-ink", inkFor(a.base));
  }
  else { root.style.removeProperty("--grass"); root.style.removeProperty("--grass-bright"); root.style.removeProperty("--grass-ink"); }
  document.querySelector('meta[name=theme-color]').setAttribute("content", state.theme==="dark" ? "#0a0a0a" : "#f3efe8");
  let html="";
  switch(state.view){
    case "cars":        html=viewCars(); break;
    case "addcar":      html=viewAddCar(); break;
    case "car":         html=viewCar(); break;
    case "add":         html=viewAdd(); break;
    case "history":     html=viewHistory(); break;
    case "charts":      html=viewCharts(); break;
    case "carsettings": html=viewCarSettings(); break;
    case "data":        html=viewData(); break;
    default:            html=viewCars();
  }
  app.innerHTML = html;
  bind();
}

          ${x.full?"":'<span class="tag">частковий долив</span>'}
        </div>
        ${right}
      </div>`;
    }).join("");
  }
  return `
  <div class="topbar">
    <button class="icon-btn back" data-go="car">‹</button>
    <h1>Історія</h1>
  </div>
  ${list}`;
}

/* =========================================================
   ГРАФІКИ (саморобні SVG)
   ========================================================= */
function lineChart(values, labels, dec){
  dec = (dec==null?1:dec);
  const W=520, H=210, padL=46, padR=14, padT=20, padB=28;
  const n=values.length;
  const max=Math.max(...values)*1.1, min=Math.min(...values)*0.9;
  const range=(max-min)||1;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const X=i=> padL + (n===1?innerW/2:i/(n-1)*innerW);
  const Y=v=> padT + innerH - (v-min)/range*innerH;
  const step=Math.max(1,Math.ceil(n/6));

  // сітка (2 лінії)
  let grid="";
  [0,0.5,1].forEach(t=>{
    const val=min+range*t, y=Y(val);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"></line>`;
    grid+=`<text x="6" y="${(y+4).toFixed(1)}" font-family="JetBrains Mono" font-size="11" fill="var(--text-dim)">${fmt(val,dec)}</text>`;
  });
  let path = values.map((v,i)=>`${i===0?'M':'L'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  let dots="", lab="";
  values.forEach((v,i)=>{
    dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="4" fill="var(--grass-bright)"></circle>`;
    if(n<=10) dots+=`<text x="${X(i).toFixed(1)}" y="${(Y(v)-10).toFixed(1)}" text-anchor="middle" font-family="Fraunces" font-size="13" fill="var(--text)">${fmt(v,dec)}</text>`;
    if(i%step===0) lab+=`<text x="${X(i).toFixed(1)}" y="${H-9}" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="var(--text-dim)">${labels[i]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${grid}
    <path d="${path}" fill="none" stroke="var(--grass)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></path>${dots}${lab}</svg>`;
}

/* =========================================================
   ОБРОБНИКИ ПОДІЙ
   ========================================================= */
function go(view){
  state.view=view;
  state.editFillId=null; state._addError=null; state._arm=null;
  state.uiRename=false; state.uiDelCar=false; state.uiAddName=null; state.uiAddAccent=null;
  state.uiPhotoId=null; state.uiPhotoCleared=false; state._photoBusy=false;
  state._pendingImport=null; state._pendingPhotos=null; state._importError=null;
  save(); render();
}

function bind(){
  // навігація
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{ feedback(); go(el.dataset.go); });

  // відкрити авто (тап) + утримання → налаштування авто
  document.querySelectorAll("[data-open]").forEach(el=>{
    let timer=null, longed=false;
    const open=()=>{ if(longed){longed=false;return;} feedback(); state.activeCarId=el.dataset.open; go("car"); };
    const start=()=>{ longed=false; timer=setTimeout(()=>{ longed=true; feedback(); state.activeCarId=el.dataset.open; go("carsettings"); },550); };
    const cancel=()=>{ clearTimeout(timer); };
    el.onclick=open;
    el.addEventListener("touchstart",start,{passive:true});
    el.addEventListener("touchend",cancel);
    el.addEventListener("touchmove",cancel);
    el.addEventListener("mousedown",start);
    el.addEventListener("mouseup",cancel);
    el.addEventListener("mouseleave",cancel);
  });

  // перемикач теми (головний екран)
  const ttTop=document.getElementById("toggle-theme-top");
  if(ttTop) ttTop.onclick=()=>{ state.theme = state.theme==="dark"?"light":"dark"; feedback(); save(); render(); };

  // === екран нового авто ===
  const newName=document.getElementById("new-car-name");
  if(newName) newName.oninput=()=>{ state.uiAddName=newName.value; };
  const confirmCar=document.getElementById("confirm-car");
  if(confirmCar) confirmCar.onclick=()=>{
    const name=((document.getElementById("new-car-name")||{}).value||state.uiAddName||"").trim();
    if(!name){ const i=document.getElementById("new-car-name"); if(i)i.focus(); return; }
    const c={id:uid(),name,accent:(state.uiAddAccent||"green"),createdAt:Date.now(),fills:[]};
    state.cars.push(c); state.activeCarId=c.id; state.uiAddName=null; state.uiAddAccent=null; feedback(); save(); go("car");
  };

  // свотчі кольору. На екрані нового авто — тимчасовий вибір (зберігаємо введену назву).
  // У налаштуваннях авто — одразу застосовують колір.
  document.querySelectorAll("[data-accent]").forEach(el=>el.onclick=()=>{
    feedback();
    if(state.view==="addcar"){
      const i=document.getElementById("new-car-name"); if(i) state.uiAddName=i.value;
      state.uiAddAccent=el.dataset.accent; render();
    } else { const c=activeCar(); if(c){ c.accent=el.dataset.accent; save(); render(); } }
  });

  // двокрокове підтвердження (видалення)
  document.querySelectorAll("[data-arm]").forEach(el=>el.onclick=()=>{ feedback(); arm(el.dataset.arm); });

  // редагувати заправку (з історії)
  document.querySelectorAll("[data-edit]").forEach(el=>el.onclick=()=>{
    feedback(); state.editFillId=el.dataset.edit; state.view="add"; state._addError=null;
    state.uiPhotoId=null; state.uiPhotoCleared=false; state._photoBusy=false;
    save(); render();
  });

  // === екран додавання заправки ===
  const toggleFull=document.getElementById("toggle-full");
  if(toggleFull) toggleFull.onclick=()=>{ feedback(); toggleFull.classList.toggle("on"); updatePreview(); };

  ["f-odo","f-lit","f-cost"].forEach(id=>{
    const inp=document.getElementById(id);
    if(inp) inp.oninput=updatePreview;
  });

  const saveBtn=document.getElementById("save-fill");
  if(saveBtn) saveBtn.onclick=saveFill;

  const saveBaseBtn=document.getElementById("save-base");
  if(saveBaseBtn) saveBaseBtn.onclick=saveBaseline;

  document.querySelectorAll("[data-del-fill]").forEach(el=>el.onclick=()=>{ feedback(); delFill(el.dataset.delFill); });

  if(document.getElementById("toggle-full")) updatePreview();

  // === фото заправки ===
  const photoCam=document.getElementById("photo-cam");
  if(photoCam) photoCam.onclick=()=>{ feedback(); document.getElementById("photo-file-cam").click(); };
  const photoGal=document.getElementById("photo-gal");
  if(photoGal) photoGal.onclick=()=>{ feedback(); document.getElementById("photo-file-gal").click(); };
  const photoFileCam=document.getElementById("photo-file-cam");
  if(photoFileCam) photoFileCam.onchange=onPhotoPick;
  const photoFileGal=document.getElementById("photo-file-gal");
  if(photoFileGal) photoFileGal.onchange=onPhotoPick;
  const photoRemove=document.getElementById("photo-remove");
  if(photoRemove) photoRemove.onclick=()=>{ feedback(); state.uiPhotoId=null; state.uiPhotoCleared=true; render(); };
  // підвантаження мініатюр з IndexedDB (асинхронно, після рендера)
  document.querySelectorAll("img[data-photo]").forEach(img=>{
    photoGet(img.dataset.photo).then(blob=>{ if(blob) img.src=URL.createObjectURL(blob); }).catch(()=>{});
  });
  // перегляд фото на весь екран
  document.querySelectorAll("[data-photo-view]").forEach(el=>el.onclick=()=>{ feedback(); openPhoto(el.dataset.photoView); });

  // === дані (експорт/імпорт) ===
  const ej=document.getElementById("exp-json"); if(ej) ej.onclick=exportZip;
  const ec=document.getElementById("exp-csv");  if(ec) ec.onclick=exportCSV;
  const ij=document.getElementById("imp-json"); if(ij) ij.onclick=()=>document.getElementById("imp-file").click();
  const ifile=document.getElementById("imp-file"); if(ifile) ifile.onchange=importBackup;

  const rn=document.getElementById("rename-car");
  if(rn) rn.onclick=()=>{ feedback(); state.uiRename=true; render(); setTimeout(()=>{const i=document.getElementById("rename-input"); if(i)i.focus();},50); };
  const rcl=document.getElementById("rename-cancel");
  if(rcl) rcl.onclick=()=>{ state.uiRename=false; render(); };
  const rsv=document.getElementById("rename-save");
  if(rsv) rsv.onclick=()=>{
    const c=activeCar(); const name=(document.getElementById("rename-input").value||"").trim();
    if(name) c.name=name;
    state.uiRename=false; feedback(); save(); render();
  };
  const dc=document.getElementById("del-car");
  if(dc) dc.onclick=()=>{ feedback(); state.uiDelCar=true; render(); };
  const dcCancel=document.getElementById("del-cancel");
  if(dcCancel) dcCancel.onclick=()=>{ state.uiDelCar=false; render(); };
  const dcConfirm=document.getElementById("del-confirm");
  if(dcConfirm) dcConfirm.onclick=()=>{
    const c=activeCar();
    state.cars=state.cars.filter(x=>x.id!==c.id);
    state.activeCarId=state.cars[0]?state.cars[0].id:null;
    state.uiDelCar=false; feedback(); save(); go("cars");
  };

  // підтвердження імпорту (інлайн)
  const impC=document.getElementById("imp-confirm");
  if(impC) impC.onclick=applyImport;
  const impX=document.getElementById("imp-cancel");
  if(impX) impX.onclick=()=>{ state._pendingImport=null; state._pendingPhotos=null; render(); };
}

function readForm(){
  const g=id=>document.getElementById(id);
  return {
    odometer: parseNum(g("f-odo") ? g("f-odo").value : ""),
    liters:   parseNum(g("f-lit") ? g("f-lit").value : ""),
    cost:     parseNum(g("f-cost") ? g("f-cost").value : ""),
    full:     g("toggle-full") ? g("toggle-full").classList.contains("on") : true,
    date:     (g("f-date") && g("f-date").value) || todayLocalISO()
  };
}

function updatePreview(){
  const car=activeCar(); if(!car) return;
  const d=readForm();
  // ціна за літр
  const ph=document.getElementById("price-hint");
  if(ph){
    ph.textContent = (!isNaN(d.cost)&&!isNaN(d.liters)&&d.liters>0) ? `≈ ${fmt(d.cost/d.liters,3)} €/л` : "";
  }
  // прев'ю витрати: знаходимо попередню заправку за одометром
  const pv=document.getElementById("preview");
  if(!pv) return;
  if(isNaN(d.odometer)||isNaN(d.liters)||d.liters<=0){ pv.style.display="none"; return; }
  // попередня заправка (нижчий одометр), без урахування тієї, що редагуємо
  const others=car.fills.filter(x=>x.id!==state.editFillId);
  const prev=others.filter(x=>x.odometer<d.odometer).sort((a,b)=>b.odometer-a.odometer)[0];
  if(!prev){ pv.style.display="none"; return; }
  const dist=d.odometer-prev.odometer;
  if(dist<=0){ pv.style.display="none"; return; }
  const l100=d.liters/dist*100;
  pv.style.display="block";
  pv.innerHTML = `${fmt(dist,0)} км від минулої · <b>${fmt(l100,1)}</b> л/100${
    !isNaN(d.cost)?` · <b>${fmt(d.cost/dist*100,2)}</b> €/100`:""}`;
}

function saveBaseline(){
  const car=activeCar(); if(!car) return;
  const g=id=>document.getElementById(id);
  const odometer=parseNum(g("f-odo").value);
  const date=(g("f-date") && g("f-date").value) || todayLocalISO();
  if(isNaN(odometer)){ state._addError="Введи пробіг (км)."; render(); return; }
  if(state.editFillId){
    const f=car.fills.find(x=>x.id===state.editFillId);
    f.odometer=odometer; f.date=date;
  }else{
    car.fills.push({id:uid(), photo:null, odometer, liters:0, cost:0, full:true, isBaseline:true, date});
  }
  feedback(); state.editFillId=null; state._addError=null; save(); go("car");
}

function saveFill(){
  const car=activeCar(); if(!car) return;
  const d=readForm();
  if(isNaN(d.odometer)||isNaN(d.liters)||isNaN(d.cost)){
    state._addError="Заповни одометр, літри й суму."; render(); return;
  }
  if(state.editFillId){
    const f=car.fills.find(x=>x.id===state.editFillId);
    const oldPhoto=f.photo||null;
    Object.assign(f,d);
    // застосовуємо зміни фото
    if(state.uiPhotoId){ f.photo=state.uiPhotoId; if(oldPhoto && oldPhoto!==state.uiPhotoId) photoDel(oldPhoto); }
    else if(state.uiPhotoCleared){ f.photo=null; if(oldPhoto) photoDel(oldPhoto); }
  }else{
    car.fills.push({id:uid(), photo:state.uiPhotoId||null, isBaseline:false, ...d});
  }
  state.uiPhotoId=null; state.uiPhotoCleared=false;
  feedback(); state.editFillId=null; state._addError=null; save(); go("car");
}
function delFill(id){
  const car=activeCar(); if(!car) return;
  const f=car.fills.find(x=>x.id===id);
  if(f && f.photo) photoDel(f.photo);
  car.fills=car.fills.filter(x=>x.id!==id);
  disarm(); state.editFillId=null; save(); go("history");
}

/* Вибір фото: стискаємо, зберігаємо в IndexedDB, показуємо. */
function onPhotoPick(e){
  const file=e.target.files && e.target.files[0]; if(!file) return;
  state._photoBusy=true; render();
  compressImage(file,1280,0.8)
    .then(blob=>{ const id="ph_"+uid(); return photoPut(id,blob).then(()=>id); })
    .then(id=>{ state.uiPhotoId=id; state.uiPhotoCleared=false; state._photoBusy=false; feedback(); render(); })
    .catch(()=>{ state._photoBusy=false; state._addError="Не вдалося обробити фото."; render(); });
}

/* Перегляд фото на весь екран (DOM-оверлей поза рендером).
   Закриття: хрестик, тап по тлу, або апаратна кнопка «назад». */
function openPhoto(id){
  photoGet(id).then(blob=>{
    if(!blob) return;
    const url=URL.createObjectURL(blob);
    const ov=document.createElement("div");
    ov.className="photo-overlay";
    ov.innerHTML=`<button class="photo-close" aria-label="Закрити">✕</button><img src="${url}" alt="фото">`;
    let closed=false;
    const close=()=>{
      if(closed) return; closed=true;
      if(ov.parentNode) document.body.removeChild(ov);
      URL.revokeObjectURL(url);
      // прибираємо запис історії, щоб «назад» не виходив з додатка зайвий раз
      if(history.state && history.state.photo) history.back();
      window.removeEventListener("popstate", onPop);
    };
    const onPop=()=>{ closed=true; if(ov.parentNode) document.body.removeChild(ov); URL.revokeObjectURL(url); };
    // тап по тлу (не по фото) закриває
    ov.onclick=(e)=>{ if(e.target===ov) close(); };
    ov.querySelector(".photo-close").onclick=close;
    // апаратна кнопка «назад» закриває перегляд, а не екран
    history.pushState({photo:true}, "");
    window.addEventListener("popstate", onPop);
    document.body.appendChild(ov);
  }).catch(()=>{});
}

/* ---------- Експорт / імпорт ---------- */
function download(name, content, type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
/* Чисті дані для бекапу — без тимчасових UI-прапорців. */
function cleanState(){
  return { schemaVersion:state.schemaVersion||1, theme:state.theme, activeCarId:state.activeCarId, cars:state.cars };
}
/* Усі id фото, які зараз використовуються. */
function usedPhotoIds(){
  const ids=[];
  state.cars.forEach(c=>c.fills.forEach(f=>{ if(f.photo) ids.push(f.photo); }));
  return ids;
}
/* Зберегти копію: ZIP з data.json + photos/. */
function exportZip(){
  feedback();
  const dataBytes = strToBytes(JSON.stringify(cleanState(),null,2));
  const files = [{name:"data.json", data:dataBytes}];
  const ids = usedPhotoIds();
  Promise.all(ids.map(id=>photoGet(id).then(blob=>blob?blob.arrayBuffer().then(ab=>({id,ab})):null).catch(()=>null)))
    .then(results=>{
      results.forEach(r=>{ if(r) files.push({name:`photos/${r.id}.jpg`, data:new Uint8Array(r.ab)}); });
      const zip = zipStore(files);
      download(`zapravka-backup-${new Date().toISOString().slice(0,10)}.zip`, zip, "application/zip");
    });
}
function exportCSV(){
  feedback();
  let rows=[["Авто","Дата","Одометр_км","Літри","Сума_EUR","Повний_бак"].join(",")];
  state.cars.forEach(c=>{
    carFills(c).forEach(f=>{
      rows.push([`"${c.name}"`, f.date, f.odometer, f.liters, f.cost, f.full?"так":"ні"].join(","));
    });
  });
  download(`zapravka-${new Date().toISOString().slice(0,10)}.csv`, "\uFEFF"+rows.join("\n"), "text/csv");
}
/* Відновлення: приймає і .zip (дані+фото), і старий .json (лише дані). */
function importBackup(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const bytes=new Uint8Array(r.result);
      if(isZip(bytes)){
        const entries=unzipStore(bytes);
        const dataEntry=entries.find(x=>x.name==="data.json");
        if(!dataEntry) throw 0;
        const data=JSON.parse(bytesToStr(dataEntry.data));
        if(!data || !Array.isArray(data.cars)) throw 0;
        // фото з архіву — у тимчасове, застосуємо при підтвердженні
        const photos=entries.filter(x=>x.name.indexOf("photos/")===0 && !x.name.endsWith("/"))
          .map(x=>({id:x.name.replace("photos/","").replace(/\.jpg$/,""), data:x.data}));
        state._pendingImport=data; state._pendingPhotos=photos; state._importError=null; render();
      } else {
        const data=JSON.parse(bytesToStr(bytes));
        if(!data || !Array.isArray(data.cars)) throw 0;
        state._pendingImport=data; state._pendingPhotos=[]; state._importError=null; render();
      }
    }catch(err){ state._importError="Не вдалося прочитати файл."; render(); }
  };
  r.readAsArrayBuffer(file);
  e.target.value="";
}
/* Застосувати відновлення: дані → localStorage, фото → IndexedDB. */
function applyImport(){
  const data=state._pendingImport, photos=state._pendingPhotos||[];
  Promise.all(photos.map(p=>photoPut(p.id, new Blob([p.data],{type:"image/jpeg"})).catch(()=>{})))
    .then(()=>{
      state=Object.assign({view:"cars"}, data);
      feedback(); save(); render();
    });
}

function esc(s){ return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

/* ---------- Старт ---------- */
if(!state.view) state.view="cars";
requestPersist();
photoDB().catch(()=>{}); // прогрів сховища фото
render();
</script>
<script>
/* Реєстрація service worker (офлайн). Працює лише по https — на GitHub Pages.
   У прев'ю/file:// тихо пропускається, додаток працює і без нього. */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
